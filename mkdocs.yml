site_name: ArchLinterNet
site_description: Declarative architecture contracts and dependency linting for .NET
repo_url: https://github.com/eugenemalaschuk-source/arch-linter-net
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/icon.png
  favicon: assets/icon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Installation: installation/index.md
      - First policy: getting-started/first-policy.md
      - Run in CI: guides/ci-integration.md
  - Usage:
      - CLI: cli/index.md
      - Test adapter: usage/test-adapter.md
      - Output formats: usage/output-formats.md
      - Exit codes: usage/exit-codes.md
      - Timings: usage/timings.md
  - Policy Authoring:
      - Policy format: policy-format/index.md
      - Layers and namespace patterns: policy-format/layers-and-namespaces.md
      - External dependencies: policy-format/external-dependencies.md
      - Package dependencies: policy-format/package-dependencies.md
      - Condition sets: policy-format/condition-sets.md
      - Ignored violations and baselines: guides/migration-baselines.md
      - Supported capabilities and non-goals: policy-format/supported-capabilities.md
  - Contracts:
      - Overview: contracts/index.md
      - Dependency contracts: contracts/dependency.md
      - Layer contracts: contracts/layers.md
      - Allow-only contracts: contracts/allow-only.md
      - Cycle contracts: contracts/cycles.md
      - Acyclic sibling contracts: contracts/acyclic-siblings.md
      - Independence contracts: contracts/independence.md
      - Assembly independence contracts: contracts/assembly-independence.md
      - Assembly dependency contracts: contracts/assembly-dependency.md
      - Package dependency contracts: contracts/package-dependencies.md
      - Protected surface contracts: contracts/protected-surface.md
      - External dependency contracts: contracts/external-dependencies.md
      - External allow-only contracts: contracts/external-allow-only.md
      - Method-body contracts: contracts/method-body.md
      - Unity asmdef contracts: contracts/asmdef.md
      - Layer templates: contracts/layer-templates.md
      - Coverage contracts: contracts/coverage.md
  - Guides:
      - Adopt in an existing repository: guides/adoption.md
      - Clean architecture policy: guides/clean-architecture.md
      - Unity boundaries: guides/unity-boundaries.md
      - Troubleshooting: guides/troubleshooting.md
  - AI:
      - Overview: ai/index.md
      - Agent guide: ai/agent-guide.md
      - Policy authoring guide: ai/policy-authoring-guide.md
      - Capabilities: ai/capabilities.md
      - Policy review checklist: ai/policy-review-checklist.md
  - Reference:
      - YAML schema: reference/yaml-schema.md
      - NuGet package metadata: reference/nuget-metadata.md
      - Release process: reference/release-process.md

exclude_docs: |
  internal/

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

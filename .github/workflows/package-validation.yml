name: Package Validation

on:
  pull_request:

concurrency:
  group: package-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate_packages:
    name: Validate NuGet Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: make restore

      - name: Pack and verify package set
        shell: bash
        run: |
          rm -rf nupkg
          make pack

          mapfile -t packages < <(find nupkg -maxdepth 1 -type f -name '*.nupkg' -printf '%f\n' | sort)
          printf 'Produced packages:\n%s\n' "${packages[*]}"

          if [ "${#packages[@]}" -ne 4 ]; then
            echo "Expected exactly 4 NuGet packages, found ${#packages[@]}." >&2
            exit 1
          fi

          for package_id in ArchLinterNet.CEL ArchLinterNet.Core ArchLinterNet.Cli ArchLinterNet.Testing; do
            matches=0
            for package in "${packages[@]}"; do
              if [[ "$package" == "$package_id".*.nupkg ]]; then
                matches=$((matches + 1))
              fi
            done

            if [ "$matches" -ne 1 ]; then
              echo "Expected exactly one package for $package_id, found $matches." >&2
              exit 1
            fi
          done

          if printf '%s\n' "${packages[@]}" | grep -q '^ArchLinterNet\.Unity\.'; then
            echo 'ArchLinterNet.Unity package must not be produced.' >&2
            exit 1
          fi

          cel_nupkg=$(printf '%s\n' "${packages[@]}" | grep '^ArchLinterNet\.CEL\.')
          cel_nuspec=$(unzip -p "nupkg/$cel_nupkg" '*.nuspec')
          cel_listing=$(unzip -Z1 "nupkg/$cel_nupkg")

          if printf '%s\n' "$cel_nuspec" | grep -q '<dependency '; then
            echo "ArchLinterNet.CEL .nuspec must declare no dependencies (it must remain a self-contained leaf package)." >&2
            exit 1
          fi

          for required_entry in README.md lib/net10.0/ArchLinterNet.CEL.dll lib/net10.0/ArchLinterNet.CEL.xml; do
            if ! printf '%s\n' "$cel_listing" | grep -qxF "$required_entry"; then
              echo "ArchLinterNet.CEL package is missing required entry '$required_entry' (README and XML API docs must ship in the package)." >&2
              exit 1
            fi
          done

          # Forbidden content: any Core/CLI/Testing assembly, an asset that would pull in YAML
          # loading, JSON schema, MSBuild/Buildalyzer, or Roslyn compilation by library name, or
          # a raw YAML/JSON-schema file of any origin (not just from a named dependency).
          cel_forbidden_pattern='ArchLinterNet\.(Core|Cli|Testing)\.(dll|xml)$|YamlDotNet|JsonSchema\.Net|Buildalyzer|Microsoft\.CodeAnalysis|Microsoft\.Extensions\.DependencyInjection|System\.Security\.Cryptography\.Xml|\.ya?ml$|\.schema\.json$'
          if printf '%s\n' "$cel_listing" | grep -Ei "$cel_forbidden_pattern"; then
            echo "ArchLinterNet.CEL package contains forbidden content (see entries above): must not embed Core/CLI/Testing assemblies, YAML/JSON-schema/Buildalyzer/Roslyn assets, or raw .yml/.yaml/.schema.json files." >&2
            exit 1
          fi

          cel_package_version=$(printf '%s\n' "$cel_nuspec" | grep -oE '<version>[^<]+</version>' | head -1 | sed -E 's#</?version>##g')
          echo "Detected ArchLinterNet.CEL package version: $cel_package_version"

          core_nupkg=$(printf '%s\n' "${packages[@]}" | grep '^ArchLinterNet\.Core\.')
          core_nuspec=$(unzip -p "nupkg/$core_nupkg" '*.nuspec')
          core_listing=$(unzip -Z1 "nupkg/$core_nupkg")

          core_cel_dependency=$(printf '%s\n' "$core_nuspec" | grep -oE '<dependency id="ArchLinterNet\.CEL"[^/]*/>')
          if [ -z "$core_cel_dependency" ]; then
            echo "Core .nuspec does not declare ArchLinterNet.CEL as a dependency." >&2
            exit 1
          fi

          core_cel_dependency_version=$(printf '%s\n' "$core_cel_dependency" | grep -oE 'version="[^"]+"' | cut -d'"' -f2)
          if [ "$core_cel_dependency_version" != "$cel_package_version" ]; then
            echo "Core declares ArchLinterNet.CEL dependency version '$core_cel_dependency_version' but the packed ArchLinterNet.CEL package version is '$cel_package_version'." >&2
            exit 1
          fi

          if printf '%s\n' "$core_listing" | grep -qxF 'lib/net10.0/ArchLinterNet.CEL.dll'; then
            echo "Core package must not embed ArchLinterNet.CEL.dll; ArchLinterNet.CEL must be a declared dependency only." >&2
            exit 1
          fi

          echo "cel_nupkg=$cel_nupkg" >> "$GITHUB_ENV"

      - name: External consumer smoke test
        shell: bash
        run: |
          set -euo pipefail

          cel_version=$(printf '%s\n' "$cel_nupkg" | sed -E 's/^ArchLinterNet\.CEL\.(.+)\.nupkg$/\1/')
          echo "Detected ArchLinterNet.CEL package version: $cel_version"

          nupkg_dir="$(pwd)/nupkg"
          smoke_dir=$(mktemp -d)
          trap 'rm -rf "$smoke_dir"' EXIT

          pushd "$smoke_dir" >/dev/null

          dotnet new console --no-restore >/dev/null

          cat > nuget.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-cel" value="$nupkg_dir" />
            </packageSources>
          </configuration>
          EOF

          cat > Program.cs <<'CSEOF'
          using ArchLinterNet.CEL;
          using ArchLinterNet.CEL.Profile;
          using ArchLinterNet.CEL.Schema;
          using ArchLinterNet.CEL.Values;

          // Proves the packed ArchLinterNet.CEL.nupkg (not a ProjectReference) is independently
          // consumable: define a schema, compile a Profile v1 predicate, and evaluate it.
          var schemaBuilder = CelContextSchema.CreateBuilder("smoke-test-v1");
          var flag = schemaBuilder.AddVariable("flag", CelType.Bool);
          var schema = schemaBuilder.Build();

          var environment = CelEnvironment.CreateBuilder(CelProfile.V1)
              .WithContextSchema(schema)
              .Build();

          var compilation = environment.CompilePredicate("flag == true");
          if (!compilation.IsSuccess)
          {
              Console.Error.WriteLine("Compilation failed.");
              return 1;
          }

          var context = environment.CreateEvaluationContextBuilder()
              .Set(flag, CelValue.Bool(true))
              .Build();

          var result = compilation.Program!.Evaluate(context);
          if (!result.IsSuccess || result.AsBool() != true)
          {
              Console.Error.WriteLine("Evaluation did not produce the expected result.");
              return 1;
          }

          Console.WriteLine("ArchLinterNet.CEL external consumer smoke test passed.");
          return 0;
          CSEOF

          dotnet add package ArchLinterNet.CEL --version "$cel_version"
          dotnet run

          popd >/dev/null

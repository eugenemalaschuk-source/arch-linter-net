name: Release NuGet packages and docs

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet package version, for example 0.1.0-preview.1'
        required: true
        type: string
      publish:
        description: 'Publish packages to NuGet.org'
        required: true
        default: false
        type: boolean

jobs:
  release:
    name: Build NuGet packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    env:
      PACKAGE_VERSION: ${{ inputs.version }}
      PACKAGE_OUTPUT: artifacts/packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version input
        shell: bash
        run: |
          if [[ -z "$PACKAGE_VERSION" ]]; then
            echo "Package version is required." >&2
            exit 1
          fi

          if [[ ! "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Package version '$PACKAGE_VERSION' is not a valid SemVer-style NuGet version." >&2
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ArchLinterNet.slnx

      - name: Build
        run: dotnet build ArchLinterNet.slnx --configuration Release --no-restore -p:Version="$PACKAGE_VERSION"

      - name: Test
        run: dotnet test ArchLinterNet.slnx --configuration Release --no-build -p:Version="$PACKAGE_VERSION"

      - name: Pack Core
        run: dotnet pack src/ArchLinterNet.Core/ArchLinterNet.Core.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION"

      - name: Pack CLI
        run: dotnet pack src/ArchLinterNet.Cli/ArchLinterNet.Cli.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION"

      - name: Pack Testing
        run: dotnet pack src/ArchLinterNet.Testing/ArchLinterNet.Testing.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION"

      - name: Pack Unity
        run: dotnet pack src/ArchLinterNet.Unity/ArchLinterNet.Unity.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ inputs.version }}
          path: |
            ${{ env.PACKAGE_OUTPUT }}/*.nupkg
            ${{ env.PACKAGE_OUTPUT }}/*.snupkg
          if-no-files-found: error

      - name: Publish to NuGet.org
        if: ${{ inputs.publish == true }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          for package in "$PACKAGE_OUTPUT"/*.nupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Publish to GitHub Packages
        if: ${{ inputs.publish == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for package in "$PACKAGE_OUTPUT"/*.nupkg; do
            dotnet nuget push "$package" --api-key "$GITHUB_TOKEN" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
          done

      - name: Create GitHub Release
        if: ${{ inputs.publish == true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="v$PACKAGE_VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$PACKAGE_OUTPUT"/*.nupkg "$PACKAGE_OUTPUT"/*.snupkg --clobber
          else
            gh release create "$tag" \
              "$PACKAGE_OUTPUT"/*.nupkg \
              "$PACKAGE_OUTPUT"/*.snupkg \
              --target "$GITHUB_SHA" \
              --title "ArchLinterNet $PACKAGE_VERSION" \
              --notes "Published ArchLinterNet $PACKAGE_VERSION packages to NuGet.org and GitHub Packages. Documentation is deployed by this workflow when publication is enabled."
          fi

  deploy-docs:
    name: Deploy GitHub Pages docs
    if: ${{ inputs.publish == true }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs
        run: make docs-build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Release NuGet packages and docs

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release scenario'
        required: true
        type: choice
        default: preview
        options:
          - preview
          - patch
          - minor
          - major
      publish:
        description: 'Publish packages to NuGet.org'
        required: true
        default: false
        type: boolean
      version_override:
        description: 'Emergency/manual package version override. Leave empty for normal releases.'
        required: false
        type: string

jobs:
  release:
    name: Build NuGet packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    outputs:
      package_version: ${{ steps.release_metadata.outputs.package_version }}
      target_tag: ${{ steps.release_metadata.outputs.target_tag }}

    env:
      PACKAGE_OUTPUT: artifacts/packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Calculate package version
        shell: bash
        run: |
          uv run python tools/release/calculate_version.py \
            --release-type "${{ inputs.release_type }}" \
            --version-override "${{ inputs.version_override }}" \
            --github-env "$GITHUB_ENV"

      - name: Export release metadata outputs
        id: release_metadata
        shell: bash
        run: |
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/release-notes

          payload="$(jq -n \
            --arg tag_name "$TARGET_TAG" \
            --arg target_commitish "$GITHUB_SHA" \
            --arg configuration_file_path ".github/release.yml" \
            '{ tag_name: $tag_name, target_commitish: $target_commitish, configuration_file_path: $configuration_file_path }')"

          if [ -n "$PREVIOUS_TAG" ]; then
            payload="$(echo "$payload" | jq --arg previous_tag_name "$PREVIOUS_TAG" '. + { previous_tag_name: $previous_tag_name }')"
          fi

          gh api \
            --method POST \
            repos/${{ github.repository }}/releases/generate-notes \
            --input - <<< "$payload" \
            --jq '.body' \
            | tee artifacts/release-notes/release-notes.md

          echo "Generated release notes for $TARGET_TAG"
          echo "---"
          cat artifacts/release-notes/release-notes.md
          echo "---"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ env.PACKAGE_VERSION }}
          path: artifacts/release-notes/release-notes.md
          if-no-files-found: error

      - name: Restore
        run: make restore

      - name: Build
        run: dotnet build ArchLinterNet.slnx --configuration Release --no-restore -p:Version="$PACKAGE_VERSION"

      - name: Acceptance
        run: make acceptance

      - name: Prepare NuGet package release notes
        shell: bash
        run: echo "PACKAGE_RELEASE_NOTES=See GitHub release notes for $TARGET_TAG." >> "$GITHUB_ENV"

      - name: Pack Core
        run: dotnet pack src/ArchLinterNet.Core/ArchLinterNet.Core.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION" -p:PackageReleaseNotes="$PACKAGE_RELEASE_NOTES"

      - name: Pack CLI
        run: dotnet pack src/ArchLinterNet.Cli/ArchLinterNet.Cli.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION" -p:PackageReleaseNotes="$PACKAGE_RELEASE_NOTES"

      - name: Pack Testing
        run: dotnet pack src/ArchLinterNet.Testing/ArchLinterNet.Testing.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION" -p:PackageReleaseNotes="$PACKAGE_RELEASE_NOTES"

      - name: Pack Unity
        run: dotnet pack src/ArchLinterNet.Unity/ArchLinterNet.Unity.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION" -p:PackageReleaseNotes="$PACKAGE_RELEASE_NOTES"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ env.PACKAGE_VERSION }}
          path: |
            ${{ env.PACKAGE_OUTPUT }}/*.nupkg
            ${{ env.PACKAGE_OUTPUT }}/*.snupkg
          if-no-files-found: error

      - name: NuGet login
        if: ${{ inputs.publish == true }}
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        if: ${{ inputs.publish == true }}
        shell: bash
        run: |
          for package in "$PACKAGE_OUTPUT"/*.nupkg; do
            dotnet nuget push "$package" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --skip-duplicate
          done

  create-release:
    name: Create GitHub Release
    if: ${{ inputs.publish == true }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release notes artifact
        uses: actions/download-artifact@v4
        with:
          name: release-notes-${{ needs.release.outputs.package_version }}
          path: artifacts/release-notes

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages-${{ needs.release.outputs.package_version }}
          path: artifacts/packages

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TARGET_TAG: ${{ needs.release.outputs.target_tag }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: |
          gh release create "$TARGET_TAG" \
            --target "$RELEASE_COMMIT" \
            --title "$TARGET_TAG" \
            --notes-file artifacts/release-notes/release-notes.md \
            artifacts/packages/*.nupkg \
            artifacts/packages/*.snupkg

  deploy-docs:
    name: Deploy GitHub Pages docs
    if: ${{ inputs.publish == true }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs
        run: make docs-build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Release NuGet packages and docs

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release scenario'
        required: true
        type: choice
        default: preview
        options:
          - preview
          - patch
          - minor
          - major
      publish:
        description: 'Publish packages to NuGet.org'
        required: true
        default: false
        type: boolean
      version_override:
        description: 'Emergency/manual package version override. Leave empty for normal releases.'
        required: false
        type: string

jobs:
  release:
    name: Build NuGet packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      PACKAGE_OUTPUT: artifacts/packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Calculate package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(uv run python tools/release/calculate_version.py \
            --release-type "${{ inputs.release_type }}" \
            --version-override "${{ inputs.version_override }}")"
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "Calculated PACKAGE_VERSION=$PACKAGE_VERSION"

      - name: Restore
        run: make restore

      - name: Build
        run: dotnet build ArchLinterNet.slnx --configuration Release --no-restore -p:Version="$PACKAGE_VERSION"

      - name: Acceptance
        run: make acceptance

      - name: Pack Core
        run: dotnet pack src/ArchLinterNet.Core/ArchLinterNet.Core.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION"

      - name: Pack CLI
        run: dotnet pack src/ArchLinterNet.Cli/ArchLinterNet.Cli.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION"

      - name: Pack Testing
        run: dotnet pack src/ArchLinterNet.Testing/ArchLinterNet.Testing.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION"

      - name: Pack Unity
        run: dotnet pack src/ArchLinterNet.Unity/ArchLinterNet.Unity.csproj --configuration Release --no-build --output "$PACKAGE_OUTPUT" -p:PackageVersion="$PACKAGE_VERSION" -p:Version="$PACKAGE_VERSION"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ env.PACKAGE_VERSION }}
          path: |
            ${{ env.PACKAGE_OUTPUT }}/*.nupkg
            ${{ env.PACKAGE_OUTPUT }}/*.snupkg
          if-no-files-found: error

      - name: NuGet login
        if: ${{ inputs.publish == true }}
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet.org
        if: ${{ inputs.publish == true }}
        shell: bash
        run: |
          for package in "$PACKAGE_OUTPUT"/*.nupkg; do
            dotnet nuget push "$package" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --skip-duplicate
          done

  deploy-docs:
    name: Deploy GitHub Pages docs
    if: ${{ inputs.publish == true }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs
        run: make docs-build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Sonar diagnostic

on:
  pull_request:
    branches:
      - main

permissions: read-all

jobs:
  report:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print SonarCloud pull request issues
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'eugenemalaschuk-source_arch-linter-net' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --user "$SONAR_TOKEN:" \
            --get "https://sonarcloud.io/api/issues/search" \
            --data-urlencode "componentKeys=$SONAR_PROJECT_KEY" \
            --data-urlencode "pullRequest=$PR_NUMBER" \
            --data-urlencode "resolved=false" \
            --data-urlencode "ps=100" \
            | jq '{total, issues: [.issues[] | {key, rule, type, severity, component, line, message, impacts}]}'

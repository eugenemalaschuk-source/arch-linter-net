name: Apply issue 276 security fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/276-code-scanning-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/276-code-scanning-hardening

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: Apply targeted source changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected exactly one match in {path}, found {count}: {old!r}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          cli = "tests/ArchLinterNet.Cli.Tests/CliIntegrationTests.cs"
          if "string joinedArgs = args.Length > 0" not in Path(cli).read_text(encoding="utf-8"):
              print("Issue 276 source changes are already applied.")
              raise SystemExit(0)

          replace_exact(
              cli,
              '                Arguments = $"build \\"{_cliProjectPath}\\" --nologo --verbosity quiet",\n',
              '')
          replace_exact(
              cli,
              '        };\n        build.Start();',
              '        };\n'
              '        build.StartInfo.ArgumentList.Add("build");\n'
              '        build.StartInfo.ArgumentList.Add(_cliProjectPath);\n'
              '        build.StartInfo.ArgumentList.Add("--nologo");\n'
              '        build.StartInfo.ArgumentList.Add("--verbosity");\n'
              '        build.StartInfo.ArgumentList.Add("quiet");\n'
              '        build.Start();')
          replace_exact(
              cli,
              '        string joinedArgs = args.Length > 0\n'
              '            ? string.Join(" ", args.Select(a => a.Contains(\' \') ? $"\\\"{a}\\\"" : a))\n'
              '            : string.Empty;\n\n',
              '')
          replace_exact(
              cli,
              '            Arguments = $"run --no-build --project \\"{_cliProjectPath}\\" -- {joinedArgs}",\n',
              '')
          replace_exact(
              cli,
              '        };\n\n        using var process = new Process { StartInfo = startInfo };',
              '        };\n\n'
              '        startInfo.ArgumentList.Add("run");\n'
              '        startInfo.ArgumentList.Add("--no-build");\n'
              '        startInfo.ArgumentList.Add("--project");\n'
              '        startInfo.ArgumentList.Add(_cliProjectPath);\n'
              '        startInfo.ArgumentList.Add("--");\n'
              '        foreach (string argument in args)\n'
              '        {\n'
              '            startInfo.ArgumentList.Add(argument);\n'
              '        }\n\n'
              '        using var process = new Process { StartInfo = startInfo };')
          replace_exact(
              cli,
              '    /* --version / -v */',
              '    [Test]\n'
              '    public void DotnetProcessArguments_PreserveWhitespaceAndEmbeddedQuotes()\n'
              '    {\n'
              '        const string complexArgument = "path with spaces/\\\"quoted\\\".yml";\n'
              '        var startInfo = new ProcessStartInfo("dotnet");\n\n'
              '        startInfo.ArgumentList.Add("--policy");\n'
              '        startInfo.ArgumentList.Add(complexArgument);\n\n'
              '        Assert.That(startInfo.ArgumentList, Is.EqualTo(new[] { "--policy", complexArgument }));\n'
              '    }\n\n'
              '    /* --version / -v */')

          for path, project_variable in (
              ("tests/ArchLinterNet.Core.Tests/ArchitectureProjectRoslynContextResolverTests.cs", "_consumerProjectPath"),
              ("tests/ArchLinterNet.Core.Tests/ArchitectureAnalysisSessionMethodBodyProjectAwareTests.cs", "consumerProjectPath"),
          ):
              replace_exact(
                  path,
                  f'        RunDotnet($"build \\"{{{project_variable}}}\\"", _fixtureRoot);',
                  f'        RunDotnet(_fixtureRoot, "build", {project_variable});')
              replace_exact(
                  path,
                  '    private static void RunDotnet(string arguments, string workingDirectory)',
                  '    private static void RunDotnet(string workingDirectory, params string[] arguments)')
              replace_exact(
                  path,
                  '        var psi = new ProcessStartInfo("dotnet", arguments)',
                  '        var psi = new ProcessStartInfo("dotnet")')
              replace_exact(
                  path,
                  '        };\n\n        using Process process = Process.Start(psi)!;',
                  '        };\n\n'
                  '        foreach (string argument in arguments)\n'
                  '        {\n'
                  '            psi.ArgumentList.Add(argument);\n'
                  '        }\n\n'
                  '        using Process process = Process.Start(psi)\n'
                  '            ?? throw new InvalidOperationException("Failed to start dotnet.");')
              replace_exact(
                  path,
                  '$"\'dotnet {arguments}\' failed with exit code {process.ExitCode}.\\n{stdout}\\n{stderr}"',
                  '$"\'dotnet\' failed with exit code {process.ExitCode}.\\n{stdout}\\n{stderr}"')
          PY

      - name: Commit source fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/ArchLinterNet.Cli.Tests/CliIntegrationTests.cs \
            tests/ArchLinterNet.Core.Tests/ArchitectureProjectRoslynContextResolverTests.cs \
            tests/ArchLinterNet.Core.Tests/ArchitectureAnalysisSessionMethodBodyProjectAwareTests.cs
          git commit -m "test: pass process arguments without command-line composition"
          git push origin HEAD:fix/276-code-scanning-hardening

      - name: Run test suite
        run: dotnet test ArchLinterNet.slnx --configuration Release --nologo

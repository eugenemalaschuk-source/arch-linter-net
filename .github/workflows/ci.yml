name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SONAR_HOST_URL: https://sonarcloud.io
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'eugenemalaschuk-source_arch-linter-net' }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || 'eugenemalaschuk-source' }}

jobs:
  pull_request_validate:
    name: Pull Request Validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Lint workflows with actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7
        with:
          shellcheck: false
          pyflakes: false
          cache: true
          fail-on-error: true

      - name: Lint workflows with zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa
        with:
          advanced-security: false
          annotations: false
          min-severity: low
          inputs: .github/workflows

      - name: Check workflow formatting
        run: npx --yes --ignore-scripts prettier@3.9.5 --check ".github/workflows/*.yml"

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: make restore

      - name: Cache SonarQube packages
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Install SonarScanner for .NET
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Validate SonarCloud configuration
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          missing=()
          [[ -n "$SONAR_TOKEN" ]] || missing+=("SONAR_TOKEN secret")
          [[ -n "$SONAR_PROJECT_KEY" ]] || missing+=("SONAR_PROJECT_KEY repository variable or committed default")
          [[ -n "$SONAR_ORGANIZATION" ]] || missing+=("SONAR_ORGANIZATION repository variable or committed default")

          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing SonarCloud configuration: %s\n' "${missing[*]}" >&2
            echo "Configure GitHub secret SONAR_TOKEN and, if overriding defaults, repository variables SONAR_PROJECT_KEY / SONAR_ORGANIZATION." >&2
            exit 1
          fi

      - name: Begin SonarCloud analysis
        id: sonar_begin
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /o:"$SONAR_ORGANIZATION" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.qualitygate.timeout=300 \
            /d:sonar.cs.opencover.reportsPaths="test-results/**/coverage.opencover.xml" \
            /d:sonar.cs.vstest.reportsPaths="test-results/**/*.trx"

      - name: Lint
        run: make lint

      - name: Collect test coverage
        run: make test-coverage

      - name: Resolve coverage report paths
        id: coverage_reports
        shell: bash
        run: |
          files="$(find test-results -name 'coverage.cobertura.xml' -print | sed 's#^#./#' | paste -sd, -)"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Upload test coverage to Codecov
        if: steps.coverage_reports.outputs.files != '' && github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage_reports.outputs.files }}
          disable_search: true
          fail_ci_if_error: false

      - name: End SonarCloud analysis
        id: sonar_end
        if: success() && steps.sonar_begin.outcome == 'success'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Publish SonarCloud PR summary link
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          {
            echo "### SonarCloud PR analysis"
            echo
            echo "- Quality gate check: review the Sonar-created GitHub status/check on this pull request."
            echo "- SonarCloud PR analysis: [Open SonarCloud PR report](https://sonarcloud.io/summary/new_code?id=${SONAR_PROJECT_KEY}&pullRequest=${{ github.event.pull_request.number }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Explain SonarCloud skip for fork pull request
        if: always() && github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: |
          {
            echo "### SonarCloud PR analysis"
            echo
            echo "Skipped for this fork pull request because GitHub does not expose repository secrets to untrusted forks."
            echo "Run the branch from this repository or validate again after merge to verify the SonarCloud quality gate."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test architecture coverage report generator
        if: github.event_name == 'pull_request'
        run: make test-architecture-coverage-report

      - name: Collect changed first-party files
        id: changed_files
        continue-on-error: true
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git diff --name-only --diff-filter=ACMR "origin/$PR_BASE_REF"...HEAD \
            -- '*.cs' ':!*.g.cs' ':!*Designer.cs' > changed-files.txt

      - name: Run architecture coverage analysis
        if: github.event_name == 'pull_request'
        id: architecture_coverage
        continue-on-error: true
        run: |
          DIFF_STATUS="ok"
          if [ "${{ steps.changed_files.outcome }}" = "failure" ]; then
            DIFF_STATUS="failed"
          fi
          make architecture-coverage-ci DIFF_STATUS="$DIFF_STATUS"

      - name: Upload strict diagnostics
        if: always() && github.event_name == 'pull_request' && hashFiles('architecture-strict.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: architecture-strict
          path: architecture-strict.json

      - name: Upload audit diagnostics
        if: always() && github.event_name == 'pull_request' && hashFiles('architecture-audit.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: architecture-audit
          path: architecture-audit.json

      - name: Upload architecture coverage report
        if: always() && github.event_name == 'pull_request' && hashFiles('architecture-coverage.md') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: architecture-coverage-report
          path: architecture-coverage.md

      - name: Comment architecture coverage on pull request
        if: always() && hashFiles('architecture-coverage.md') != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- architecture-coverage-report -->';
            const body = `${marker}\n${fs.readFileSync('architecture-coverage.md', 'utf8')}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if strict architecture coverage failed
        if: steps.architecture_coverage.outcome == 'failure'
        run: exit 1

  main_badge_refresh:
    name: Main Badge Refresh
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 10.0.x

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081

      - name: Restore
        run: make restore

      - name: Cache SonarQube packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Install SonarScanner for .NET
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Validate SonarCloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          missing=()
          [[ -n "$SONAR_TOKEN" ]] || missing+=("SONAR_TOKEN secret")
          [[ -n "$SONAR_PROJECT_KEY" ]] || missing+=("SONAR_PROJECT_KEY repository variable or committed default")
          [[ -n "$SONAR_ORGANIZATION" ]] || missing+=("SONAR_ORGANIZATION repository variable or committed default")

          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing SonarCloud configuration: %s\n' "${missing[*]}" >&2
            echo "Configure GitHub secret SONAR_TOKEN and, if overriding defaults, repository variables SONAR_PROJECT_KEY / SONAR_ORGANIZATION." >&2
            exit 1
          fi

      - name: Begin SonarCloud analysis
        id: sonar_begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
            /k:"$SONAR_PROJECT_KEY" \
            /o:"$SONAR_ORGANIZATION" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="$SONAR_HOST_URL" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.qualitygate.timeout=300 \
            /d:sonar.cs.opencover.reportsPaths="test-results/**/coverage.opencover.xml" \
            /d:sonar.cs.vstest.reportsPaths="test-results/**/*.trx"

      - name: Collect main branch test coverage
        run: make test-coverage-main-ci

      - name: Resolve coverage report paths
        id: coverage_reports
        shell: bash
        run: |
          files="$(find test-results -name 'coverage.cobertura.xml' -print | sed 's#^#./#' | paste -sd, -)"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Upload test coverage to Codecov
        if: steps.coverage_reports.outputs.files != ''
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage_reports.outputs.files }}
          disable_search: true
          fail_ci_if_error: false

      - name: End SonarCloud analysis
        id: sonar_end
        if: success() && steps.sonar_begin.outcome == 'success'
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

name: Apply issue 276 formatter fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'fix/276-code-scanning-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/276-code-scanning-hardening

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v5.1.0
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: make restore

      - name: Format C#
        run: dotnet format ArchLinterNet.slnx --verbosity minimal

      - name: Commit formatter fix
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatter changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/ArchLinterNet.Cli.Tests/CliIntegrationTests.cs
          git commit -m "style: satisfy C# naming rules"
          git push origin HEAD:fix/276-code-scanning-hardening

name: Apply issue 276 naming fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'fix/276-code-scanning-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/276-code-scanning-hardening

      - name: Apply naming-rule fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tests/ArchLinterNet.Cli.Tests/CliIntegrationTests.cs")
          text = path.read_text(encoding="utf-8")
          if text.count("complexArgument") != 3:
              raise RuntimeError("Expected exactly three complexArgument references")
          path.write_text(text.replace("complexArgument", "ComplexArgument"), encoding="utf-8")
          PY

      - name: Commit naming-rule fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/ArchLinterNet.Cli.Tests/CliIntegrationTests.cs
          git commit -m "style: satisfy C# naming rules"
          git push origin HEAD:fix/276-code-scanning-hardening

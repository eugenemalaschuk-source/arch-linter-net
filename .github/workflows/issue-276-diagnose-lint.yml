name: Diagnose issue 276 format

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'fix/276-code-scanning-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: fix/276-code-scanning-hardening

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v5.1.0
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: make restore

      - name: Capture formatter diagnostics
        shell: bash
        run: |
          set +e
          dotnet format ArchLinterNet.slnx --verify-no-changes --verbosity diagnostic > /tmp/format.log 2>&1
          status=$?
          tail -200 /tmp/format.log > issue-276-format.log
          echo "FORMAT_EXIT_CODE=$status" >> issue-276-format.log

      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f issue-276-format.log
          if git diff --cached --quiet; then
            echo "Diagnostics are unchanged."
            exit 0
          fi
          git commit -m "chore: capture issue 276 format diagnostics"
          git push origin HEAD:fix/276-code-scanning-hardening

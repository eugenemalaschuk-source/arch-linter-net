name: Temporary Sonar diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Print public PR issues
        shell: bash
        run: |
          set -euo pipefail

          response="$(curl --silent --show-error --get \
            --data-urlencode 'componentKeys=eugenemalaschuk-source_arch-linter-net' \
            --data-urlencode 'pullRequest=271' \
            --data-urlencode 'statuses=OPEN,CONFIRMED' \
            --data-urlencode 'inNewCodePeriod=true' \
            --data-urlencode 'ps=100' \
            'https://sonarcloud.io/api/issues/search')"

          echo "$response" | jq .
          echo "$response" | jq -r '.issues[] | [.rule, .severity, .component, (.line // 0 | tostring), .message] | @tsv'

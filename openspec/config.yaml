schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  Tech stack: .NET 10, C#, NUnit, YamlDotNet
  Solution format: .slnx
  TreatWarningsAsErrors: true

  ## Spec lifecycle
  - New capabilities (specs/) are created inside the change directory during proposal.
  - Before archiving a change, ALL specs in the change MUST be synced to openspec/specs/<capability>/spec.md.
  - The openspec archive workflow only checks for "delta specs" (modifications to existing specs).
    It does NOT automatically promote new specs to the main specs directory.
  - Therefore: during archive, always check if the change introduces new capabilities.
    If so, copy their spec files to openspec/specs/<capability>/ before moving to archive.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
rules:
  archive:
    - Before archiving, collect all spec files from openspec/changes/<name>/specs/
    - For each capability present in the change but missing from openspec/specs/,
      copy it to openspec/specs/<capability>/spec.md
    - Only then move the change directory to archive/

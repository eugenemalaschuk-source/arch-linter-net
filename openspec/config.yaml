context: |
  Tech stack: .NET 10, C#, NUnit, YamlDotNet
  Solution format: .slnx
  TreatWarningsAsErrors: true

  ## Spec lifecycle
  - New capabilities (specs/) are created as delta specs (## ADDED Requirements)
    inside the change directory during proposal.
  - Run `openspec archive <change-name>` to finish a change. It automatically
    rebuilds openspec/specs/<capability>/spec.md from the change's delta specs —
    for new capabilities it generates the `# <Title> Specification` / `## Purpose`
    / `## Requirements` skeleton and inserts the ADDED requirements; for existing
    capabilities it applies ADDED/MODIFIED/REMOVED/RENAMED onto the current spec.
  - Do NOT copy a change's delta spec file (the one starting with
    `## ADDED Requirements`) directly into openspec/specs/<capability>/spec.md.
    Delta headers are only valid under openspec/changes/<name>/specs/ — a main
    spec must have `## Purpose` and a `## Requirements` section, or
    `openspec validate` will reject it. If `openspec archive` isn't available,
    rebuild the target spec by hand into that format instead of copying the delta
    file verbatim.
  - After archiving (or any manual spec edit), run `openspec validate --all` to
    confirm every spec under openspec/specs/ still passes.

version: 1
name: ArchLinterNet Architecture Contract

layers:
  core:
    namespace: ArchLinterNet.Core
  core_model:
    namespace: ArchLinterNet.Core.Model
  core_io:
    namespace: ArchLinterNet.Core.IO
  core_reporting:
    namespace: ArchLinterNet.Core.Reporting
  core_discovery:
    namespace: ArchLinterNet.Core.Discovery
  core_resolution:
    namespace: ArchLinterNet.Core.Resolution
  core_scanning:
    namespace: ArchLinterNet.Core.Scanning
  core_contracts:
    namespace: ArchLinterNet.Core.Contracts
  core_execution:
    namespace: ArchLinterNet.Core.Execution
  core_validation:
    namespace: ArchLinterNet.Core.Validation
  core_asmdef:
    namespace: ArchLinterNet.Core.Asmdef
  core_composition:
    namespace: ArchLinterNet.Core.Composition
  cli:
    namespace: ArchLinterNet.Cli
  testing:
    namespace: ArchLinterNet.Testing
  unity:
    namespace: ArchLinterNet.Unity

external_dependencies:
  dependency_injection_container:
    namespace_prefixes:
      - Microsoft.Extensions.DependencyInjection

analysis:
  target_assemblies:
    - ArchLinterNet.Core
    - ArchLinterNet.Cli
    - ArchLinterNet.Testing
    - ArchLinterNet.Unity
  assembly_search_paths:
    - src/ArchLinterNet.Cli/bin/Debug/net10.0
    - src/ArchLinterNet.Testing/bin/Debug/net10.0
    - src/ArchLinterNet.Unity/bin/Debug/net10.0
  coverage: error

contracts:
  strict:
    - name: cli-must-not-depend-on-testing
      id: cli-must-not-depend-on-testing
      source: cli
      forbidden: [testing, unity]
      reason: CLI should only depend on Core.

    - name: testing-must-not-depend-on-cli
      id: testing-must-not-depend-on-cli
      source: testing
      forbidden: [cli, unity]
      reason: Testing adapter should only depend on Core.

    - name: unity-must-not-depend-on-cli-or-testing
      id: unity-must-not-depend-on-cli-or-testing
      source: unity
      forbidden: [cli, testing]
      reason: Unity package should only depend on Core.

    - name: cli-must-use-validation-application-seam
      id: cli-must-use-validation-application-seam
      source: cli
      forbidden: [core_execution, core_contracts, core_resolution, core_scanning]
      reason: CLI must call the Core.Validation application seam instead of constructing contract runners or loading policies directly.

    - name: testing-must-use-validation-application-seam
      id: testing-must-use-validation-application-seam
      source: testing
      forbidden: [core_execution, core_contracts, core_resolution, core_scanning]
      reason: Testing adapter must call the composed validation seam instead of constructing contract runners, loading policies, resolving roots, or scanning directly.

    - name: unity-must-use-asmdef-application-seam
      id: unity-must-use-asmdef-application-seam
      source: unity
      forbidden: [core_execution, core_contracts, core_resolution, core_scanning]
      reason: Unity must call the narrow Core.Asmdef application seam instead of loading contracts, resolving the repository root, or invoking the asmdef scanner directly.

    - name: core-execution-must-not-depend-on-hosts
      id: core-execution-must-not-depend-on-hosts
      source: core_execution
      forbidden: [cli, testing, unity]
      reason: Contract execution and handler internals must stay usable from any host and must not couple back to a specific CLI, testing, or Unity adapter.

    - name: core-reporting-stays-a-diagnostics-leaf
      id: core-reporting-stays-a-diagnostics-leaf
      source: core_reporting
      forbidden: [cli, testing, unity, core_execution, core_validation, core_resolution, core_scanning, core_contracts]
      reason: Diagnostics formatting is a leaf consumed by higher layers and must not depend back on business logic.

    - name: core-model-stays-independent
      id: core-model-stays-independent
      source: core_model
      forbidden: [cli, testing, unity, core_execution, core_validation, core_resolution, core_scanning, core_contracts, core_reporting]
      reason: Model types are the most fundamental layer and must not depend on anything else.

    - name: core-io-stays-independent
      id: core-io-stays-independent
      source: core_io
      forbidden: [cli, testing, unity, core_execution, core_validation, core_resolution, core_scanning, core_contracts, core_reporting, core_discovery, core_composition]
      reason: Infrastructure seams (file system, environment, assembly loading, Roslyn compilation) are a fundamental replaceable boundary and must not depend on the business logic layers that consume them.

    - name: core-resolution-must-not-depend-on-execution-or-validation
      id: core-resolution-must-not-depend-on-execution-or-validation
      source: core_resolution
      forbidden: [core_execution, core_validation, cli, testing, unity]
      reason: Repository and assembly resolution must not depend upward on contract execution or the application seam.

    - name: core-scanning-must-not-depend-on-execution-or-validation
      id: core-scanning-must-not-depend-on-execution-or-validation
      source: core_scanning
      forbidden: [core_execution, core_validation, cli, testing, unity]
      reason: Scanning internals must not depend upward on contract execution or the application seam.

    - name: core-discovery-must-not-depend-on-execution-or-validation
      id: core-discovery-must-not-depend-on-execution-or-validation
      source: core_discovery
      forbidden: [core_execution, core_validation, cli, testing, unity]
      reason: Project/solution discovery internals must not depend upward on contract execution or the application seam.

    - name: core-validation-must-not-bypass-application-internals
      id: core-validation-must-not-bypass-application-internals
      source: core_validation
      forbidden: [core_scanning, core_discovery, core_resolution, core_io]
      reason: The application seam must reach scanning, discovery, resolution, and infrastructure IO only through Core.Execution (or Core.Asmdef for Unity), not by depending on their internals directly.

  strict_external:
    - name: core-model-must-not-depend-on-di-container
      source: core_model
      forbidden: [dependency_injection_container]
      reason: Container APIs must stay confined to the composition boundary.

    - name: core-io-must-not-depend-on-di-container
      source: core_io
      forbidden: [dependency_injection_container]
      reason: Container APIs must stay confined to the composition boundary.

    - name: core-reporting-must-not-depend-on-di-container
      source: core_reporting
      forbidden: [dependency_injection_container]
      reason: Container APIs must stay confined to the composition boundary.

    - name: core-discovery-must-not-depend-on-di-container
      source: core_discovery
      forbidden: [dependency_injection_container]
      reason: Container APIs must stay confined to the composition boundary.

    - name: core-resolution-must-not-depend-on-di-container
      source: core_resolution
      forbidden: [dependency_injection_container]
      reason: Container APIs must stay confined to the composition boundary.

    - name: core-scanning-must-not-depend-on-di-container
      source: core_scanning
      forbidden: [dependency_injection_container]
      reason: Container APIs must stay confined to the composition boundary.

    - name: core-contracts-must-not-depend-on-di-container
      source: core_contracts
      forbidden: [dependency_injection_container]
      reason: Container APIs must stay confined to the composition boundary.

    - name: core-execution-must-not-depend-on-di-container
      source: core_execution
      forbidden: [dependency_injection_container]
      reason: Container APIs must stay confined to the composition boundary.

    - name: core-validation-must-not-depend-on-di-container
      source: core_validation
      forbidden: [dependency_injection_container]
      reason: Application services consume the composition root's interfaces, not container APIs directly.

    - name: core-asmdef-must-not-depend-on-di-container
      source: core_asmdef
      forbidden: [dependency_injection_container]
      reason: Application services consume the composition root's interfaces, not container APIs directly.

    - name: cli-must-not-depend-on-di-container
      source: cli
      forbidden: [dependency_injection_container]
      reason: Adapters must consume the composition root's facade, not container APIs directly.

    - name: testing-must-not-depend-on-di-container
      source: testing
      forbidden: [dependency_injection_container]
      reason: Adapters must consume the composition root's facade, not container APIs directly.

    - name: unity-must-not-depend-on-di-container
      source: unity
      forbidden: [dependency_injection_container]
      reason: Adapters must consume the composition root's facade, not container APIs directly.

  strict_layers:
    - name: core-layering
      id: core-layering
      layers:
        - cli
        - testing
        - unity
        - core
      reason: Dependencies must point toward Core.

    - name: core-application-seam-layering
      id: core-application-seam-layering
      layers:
        - cli
        - core_validation
        - core_execution
        - core_model
      reason: CLI calls the Core.Validation application seam, which orchestrates Core.Execution, which ultimately rests on Core.Model.

  strict_cycles:
    - name: package-cycles
      id: package-cycles
      layers:
        - core
        - cli
        - testing
        - unity
      reason: Packages must not form dependency cycles.

  strict_protected:
    - name: core-scanning-internals-are-protected
      id: core-scanning-internals-are-protected
      protected: [core_scanning]
      allowed_importers: [core]
      reason: Scanning internals must not be referenced outside Core.

    - name: core-discovery-internals-are-protected
      id: core-discovery-internals-are-protected
      protected: [core_discovery]
      allowed_importers: [core]
      reason: Project/solution discovery internals must not be referenced outside Core.

    - name: core-resolution-internals-are-protected
      id: core-resolution-internals-are-protected
      protected: [core_resolution]
      allowed_importers: [core]
      reason: Repository and assembly resolution internals must not be referenced outside Core.

  strict_coverage:
    - name: assembly-coverage
      id: assembly-coverage
      scope: assembly
      reason: Every first-party assembly must be mapped to a declared layer or explicitly excluded.

    - name: namespace-coverage
      id: namespace-coverage
      scope: namespace
      roots:
        - namespace: ArchLinterNet.Core
        - namespace: ArchLinterNet.Cli
        - namespace: ArchLinterNet.Testing
        - namespace: ArchLinterNet.Unity
      reason: Every first-party root namespace must be mapped to a declared layer or explicitly excluded.

    - name: self-policy-rule-input-coverage
      id: self-policy-rule-input-coverage
      scope: rule_input
      contract_ids:
        - cli-must-not-depend-on-testing
        - testing-must-not-depend-on-cli
        - unity-must-not-depend-on-cli-or-testing
        - cli-must-use-validation-application-seam
        - testing-must-use-validation-application-seam
        - unity-must-use-asmdef-application-seam
        - core-execution-must-not-depend-on-hosts
        - core-reporting-stays-a-diagnostics-leaf
        - core-model-stays-independent
        - core-io-stays-independent
        - core-resolution-must-not-depend-on-execution-or-validation
        - core-scanning-must-not-depend-on-execution-or-validation
        - core-discovery-must-not-depend-on-execution-or-validation
        - core-validation-must-not-bypass-application-internals
        - core-scanning-internals-are-protected
        - core-discovery-internals-are-protected
        - core-resolution-internals-are-protected
        - core-layering
        - core-application-seam-layering
        - package-cycles
      reason: The recovered Core architecture's base package rules, seam, leaf-isolation, and protected-surface rules must keep matching real code so a renamed or deleted layer cannot silently stop being enforced.

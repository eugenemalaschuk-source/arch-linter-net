version: 1
name: Test Coverage Overlapping Layer Exclusion Root
imports:
  - coverage-overlapping-layer-exclusion-fragment.yml

layers:
  contracts_broad:
    namespace: ArchLinterNet.Core.Contracts.*
    exclude:
      - namespace: ArchLinterNet.Core.Contracts.Families

analysis:
  target_assemblies:
    - ArchLinterNet.Core
  coverage: warn

contracts:
  strict: []
  strict_coverage:
    - id: contracts-namespace-coverage
      name: contracts-namespace-coverage
      scope: namespace
      roots:
        - namespace: ArchLinterNet.Core.Contracts
      reason: Contracts namespaces must be mapped or explicitly excluded.

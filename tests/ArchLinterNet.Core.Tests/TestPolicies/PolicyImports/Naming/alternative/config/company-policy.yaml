version: 1
name: Filename-independent policy
imports:
  - pieces/domain.data
layers:
  application:
    namespace: Example.Application
analysis:
  target_assemblies: [Example.Application]
contracts:
  strict:
    - id: application-does-not-depend-on-domain
      name: application-does-not-depend-on-domain
      source: application
      forbidden: [domain]


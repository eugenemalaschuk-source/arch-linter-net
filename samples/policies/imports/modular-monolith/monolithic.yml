version: 1
name: Modular Monolith Imported Policy

classification:
  attributes:
    - attribute: MyCompany.Product.Architecture.DomainLayerAttribute
      role: DomainLayer
      metadata:
        module: constructor[0]
    - attribute: MyCompany.Product.Architecture.ApplicationLayerAttribute
      role: ApplicationLayer
      metadata:
        module: constructor[0]
    - attribute: MyCompany.Product.Architecture.PortAttribute
      role: Port
      metadata:
        module: constructor[0]
    - attribute: MyCompany.Product.Architecture.AdapterAttribute
      role: Adapter
      metadata:
        module: constructor[0]
    - attribute: MyCompany.Product.Architecture.AntiCorruptionLayerAttribute
      role: AntiCorruptionLayer
      metadata:
        module: constructor[0]
    - attribute: MyCompany.Product.Architecture.LegacyDatabaseAdapterAttribute
      role: Adapter
      metadata:
        module: constructor[0]

layers:
  composition_root:
    namespace: MyCompany.Product.Host.Composition
  shared_kernel:
    namespace: MyCompany.Product.SharedKernel
  sales_domain:
    namespace: MyCompany.Product.Modules.Sales.Domain
  sales_contracts:
    namespace: MyCompany.Product.Modules.Sales.Contracts
  inventory_domain:
    namespace: MyCompany.Product.Modules.Inventory.Domain
  inventory_contracts:
    namespace: MyCompany.Product.Modules.Inventory.Contracts
  catalog_domain:
    namespace: MyCompany.Product.Modules.Catalog.Domain
  catalog_contracts:
    namespace: MyCompany.Product.Modules.Catalog.Contracts
  legacy_crm_domain:
    namespace: MyCompany.Product.Modules.LegacyCrm.Domain

analysis:
  target_assemblies:
    - MyCompany.Product.Host
    - MyCompany.Product.Modules.Sales
    - MyCompany.Product.Modules.Inventory
    - MyCompany.Product.SharedKernel
    - MyCompany.Product.Modules.Catalog
    - MyCompany.Product.Modules.LegacyCrm

contracts:
  strict_composition:
    - id: service-locator-confined-to-host
      name: service-locator-confined-to-host
      allowed_only_in_layers: [composition_root]
      forbidden_apis: [System.IServiceProvider.GetService]
      reason: Service resolution belongs only in the host composition root.

  strict_independence:
    - id: bounded-context-domains-independent
      name: bounded-context-domains-independent
      layers: [sales_domain, inventory_domain, catalog_domain, legacy_crm_domain]
      reason: Bounded-context domains communicate through contracts, not direct implementation references.

  strict:
    - id: shared-kernel-does-not-depend-on-modules
      name: shared-kernel-does-not-depend-on-modules
      source: shared_kernel
      forbidden: [sales_domain, inventory_domain, catalog_domain, legacy_crm_domain]
      reason: Shared kernel code must remain reusable by every bounded context.

  strict_allow_only:
    - id: sales-contracts-use-shared-kernel
      name: sales-contracts-use-shared-kernel
      source: sales_contracts
      allowed: [shared_kernel]
      reason: Sales public contracts expose only stable shared-kernel types.
    - id: inventory-contracts-use-shared-kernel
      name: inventory-contracts-use-shared-kernel
      source: inventory_contracts
      allowed: [shared_kernel]
      reason: Inventory public contracts expose only stable shared-kernel types.
    - id: catalog-contracts-use-shared-kernel
      name: catalog-contracts-use-shared-kernel
      source: catalog_contracts
      allowed: [shared_kernel]
      reason: Catalog public contracts expose only stable shared-kernel types.

  strict_context_dependencies:
    - id: sales-domain-does-not-use-other-domains
      name: sales-domain-does-not-use-other-domains
      source:
        role: DomainLayer
        metadata:
          module: Sales
      forbidden:
        - role: DomainLayer
          metadata:
            module: "!{source.metadata.module}"
      reason: Semantic module metadata prevents direct cross-context domain dependencies.

  strict_port_boundaries:
    - id: sales-to-catalog-through-port
      name: sales-may-reach-catalog-only-through-port
      source:
        role: ApplicationLayer
        metadata:
          module: Sales
      target_context:
        metadata:
          module: Catalog
      allowed_seams:
        - role: Port
          metadata:
            module: Catalog
      forbidden:
        - role: DomainLayer
          metadata:
            module: Catalog
        - role: Adapter
          metadata:
            module: Catalog
      reason: Sales must reach Catalog only through the reviewed Catalog port, never Catalog internals.
    - id: legacy-crm-through-acl
      name: legacy-crm-must-use-anti-corruption-layer
      source:
        role: DomainLayer
        metadata:
          module: LegacyCrm
      target_context:
        metadata:
          module: LegacyCrm
      allowed_seams:
        - role: AntiCorruptionLayer
          metadata:
            module: LegacyCrm
      forbidden:
        - role: Adapter
          metadata:
            module: LegacyCrm
      reason: LegacyCrm domain code must reach the legacy database only through the reviewed anti-corruption layer, never a raw database adapter.

  strict_layout_conventions:
    - id: application-services-have-matching-interfaces
      name: application-services-folder-requires-concrete-services-with-interfaces
      files_matching:
        folder_segment: Services
      require_type_kind: class
      required_name_suffix: Service
      require_matching_interface:
        name_prefix: I
      reason: Every Application service class needs a matching interface, and the Services folder must not accumulate misplaced interfaces.

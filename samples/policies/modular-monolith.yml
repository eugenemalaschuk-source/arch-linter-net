# Standalone policy recipe. Replace assemblies and namespaces with real values
# from the repository being validated before running ArchLinterNet.
version: 1
name: Modular Monolith Policy Recipe

# classification.attributes/assembly_attributes are implemented (see
# openspec/specs/attribute-role-extraction) and produce real role/metadata facts for scanned
# types. classification.namespace/exclusions/etc. below remain reserved for the
# semantic-classification-model design (schema acceptance only; see
# openspec/changes/archive/2026-07-10-design-semantic-classification-model) - no extraction or
# selector-matching engine exists for them yet, so they have no effect on the contracts below.
# Together they illustrate the reviewed YAML shape for a Sales/Inventory/SharedKernel
# modular-monolith policy.
classification:
  attributes:
    - attribute: MyCompany.Product.Architecture.DomainLayerAttribute
      role: DomainLayer
      metadata:
        module: constructor[0]
  namespace:
    - namespace: MyCompany.Product.SharedKernel
      role: SharedKernel
  exclusions:
    - namespace_suffix: Generated
      reason: Source-generated code is not hand-authored and is exempt from classification.

layers:
  composition_root:
    namespace: MyCompany.Product.Host.Composition
  shared_kernel:
    namespace: MyCompany.Product.SharedKernel
  module_impls:
    namespace: MyCompany.Product.Modules.*.Internal
  sales_impl:
    namespace: MyCompany.Product.Modules.Sales.Internal
  sales_contracts:
    namespace: MyCompany.Product.Modules.Sales.Contracts
  billing_impl:
    namespace: MyCompany.Product.Modules.Billing.Internal
  billing_contracts:
    namespace: MyCompany.Product.Modules.Billing.Contracts
  inventory_impl:
    namespace: MyCompany.Product.Modules.Inventory.Internal
  inventory_contracts:
    namespace: MyCompany.Product.Modules.Inventory.Contracts
  # Reserved: 'selector' is additive alongside the required 'namespace' above,
  # not a substitute for it - a namespace-less layer would crash
  # ArchitectureLayerResolver.IsProjectType at real execution time (it
  # iterates every declared layer's GlobPattern unconditionally). Selector
  # matching itself has no extraction/matching engine yet (#109/#111).
  sales_domain_by_role:
    namespace: MyCompany.Product.Modules.Sales.Internal
    selector:
      role: DomainLayer
      metadata:
        module: Sales

legacy_runtime_layers: []

analysis:
  target_assemblies:
    - MyCompany.Product.Modules.Sales
    - MyCompany.Product.Modules.Billing
    - MyCompany.Product.Modules.Inventory
    - MyCompany.Product.SharedKernel
  assembly_search_paths: []
  source_roots: []

contracts:
  strict:
    - name: shared-kernel-must-not-depend-on-modules
      source: shared_kernel
      forbidden: [sales_impl, billing_impl, inventory_impl]
      reason: Shared kernel must be reusable by modules without depending back on them.

  audit:
    - name: audit-sales-direct-billing-coupling
      source: sales_impl
      forbidden: [billing_impl]
      reason: Discover direct Sales to Billing implementation coupling outside public contracts.

    - name: audit-shared-kernel-reaching-module-implementation
      source: shared_kernel
      forbidden: [module_impls]
      reason: Example aggregate rule using a constrained glob layer to cover all module implementation namespaces.

  strict_layers: []
  audit_layers: []

  strict_allow_only:
    - name: sales-contracts-are-public-surface
      source: sales_contracts
      allowed: [shared_kernel]
      reason: Public contracts should depend only on stable shared kernel types.

    - name: billing-contracts-are-public-surface
      source: billing_contracts
      allowed: [shared_kernel]
      reason: Public contracts should depend only on stable shared kernel types.

    - name: inventory-contracts-are-public-surface
      source: inventory_contracts
      allowed: [shared_kernel]
      reason: Public contracts should depend only on stable shared kernel types.

  audit_allow_only: []

  strict_cycles:
    - name: module-cycles
      layers: [sales_impl, billing_impl, inventory_impl]
      reason: Business modules must not form dependency cycles.

  audit_cycles: []
  strict_method_body: []
  audit_method_body: []
  strict_asmdef: []
  audit_asmdef: []

  strict_independence:
    - name: modules-must-be-independent
      layers: [sales_impl, billing_impl, inventory_impl]
      ignored_violations:
        - source_type: MyCompany.Product.Modules.Sales.Internal.Legacy.LegacyBillingAdapter
          forbidden_reference: MyCompany.Product.Modules.Billing.Internal.LegacyBillingGateway
          reason: Existing module coupling tracked for migration; remove after billing integration is replaced.
      reason: Module implementations should communicate through contracts or messaging, not direct implementation references.

  audit_independence: []

  strict_assembly_independence:
    - name: module-assemblies-must-remain-independent
      assemblies:
        - MyCompany.Product.Modules.Sales
        - MyCompany.Product.Modules.Billing
        - MyCompany.Product.Modules.Inventory
      reason: >-
        Module assemblies must not directly reference each other at the compiled
        assembly level, even for code outside the declared namespace layers above.

  audit_assembly_independence: []

  strict_assembly_dependency:
    - name: sales-assembly-must-not-reference-billing-assembly
      source: MyCompany.Product.Modules.Sales
      forbidden:
        - MyCompany.Product.Modules.Billing
      dependency_depth: direct  # only supported value today; transitive is a planned follow-up
      reason: >-
        Sales must depend on Billing only through public contracts, never through
        a direct compiled assembly reference.

  audit_assembly_dependency: []

  strict_assembly_allow_only:
    - name: shared-kernel-assembly-allowed-refs
      source: MyCompany.Product.SharedKernel
      allowed: []
      dependency_depth: direct  # only supported value today; transitive is a planned follow-up
      reason: >-
        The shared kernel assembly must not directly reference any module
        assembly at the compiled assembly level.

  audit_assembly_allow_only: []

  # context_dependencies/context_allow_only compare discovered role/metadata directly, without
  # declaring a layers.<name> for each side - see docs/contracts/context-dependency.md and
  # docs/contracts/context-allow-only.md. classification.attributes above is implemented (see
  # the note at the top of this file), so these contracts are real, executable rules against
  # any type carrying MyCompany.Product.Architecture.DomainLayerAttribute.
  strict_context_dependencies:
    - id: sales-no-inventory-by-role
      name: sales-domain-must-not-depend-on-inventory-domain
      source:
        role: DomainLayer
        metadata:
          module: Sales
      forbidden:
        - role: DomainLayer
          metadata:
            module: "!{source.metadata.module}"
      exclude:
        - role: SharedKernel
      reason: >-
        Bounded-context domain types must not depend on another context's domain types, discovered
        by role/metadata rather than enumerating every module pair as layers.
  audit_context_dependencies: []

  strict_context_allow_only: []
  audit_context_allow_only: []

  strict_composition:
    - id: service-locator-confined-to-composition-root
      name: service-locator-confined-to-composition-root
      allowed_only_in_layers: [composition_root]
      forbidden_apis:
        - System.IServiceProvider.GetService
        - Microsoft.Extensions.DependencyInjection.IServiceCollection.
      reason: >-
        Service resolution and DI registration must happen only in the host's
        composition root, not scattered through module implementation code.

  audit_composition: []

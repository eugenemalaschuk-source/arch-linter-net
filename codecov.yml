coverage:
  precision: 2
  round: down
  range: "70..100"

  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: success
        if_not_found: success

    patch:
      default:
        target: 80
        threshold: 0%
        branches: null
        if_ci_failed: success
        if_not_found: success

comment:
  layout: "reach, diff, flags, tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "**/*.Tests/**"
  - "**/obj/**"
  - "**/bin/**"

flags:
  unittests:
    paths:
      - tests/
    carryforward: true
